<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: "Times New Roman", serif;
            padding: 20px;
            background-color: #f5f5f5;
            margin: 0;
        }

        .no-print {
            text-align: center;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-bottom: 2px solid #2E7D32;
        }

        .label-grid {
            display: grid;
            grid-template-columns: repeat(2, 9.2cm);
            justify-content: center;
            width: 100%;
            gap: 0;
        }

        .label-container {
            width: 9.2cm;
            height: 6.5cm;
            border: 1px solid #000;
            margin-right: -1px;
            margin-bottom: -1px;
            padding: 12px;
            line-height: 1.3;
            background: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header { font-weight: bold; font-size: 1.2em; text-align: center; margin-bottom: 5px; border-bottom: 1px solid #000;}

        .species { font-style: italic; font-size: 1.1em; margin-bottom: 3px; }

        .location { font-weight: bold; font-size: 1.0em; }

        .description div {
            margin-bottom: 2px;
        }

        .coordinates {
            font-size: 0.9em;
            margin-top: 4px;
            font-family: monospace;
        }

        .spacer {
            flex-grow: 1;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            font-size: 1.0em;
        }

        @media print {
            @page {
                size: A4;
                margin: 12.7mm; /* 0.5 inch margins as requested */
            }
            body { background: white; padding: 0; }
            .no-print { display: none; }
            .label-grid {
                display: grid;
                grid-template-columns: repeat(2, 9.2cm);
                justify-content: flex-start;
                gap: 0;
            }
            .label-container {
                page-break-inside: avoid;
            }
        }

        .btn-print {
            background: #2E7D32; color: white; padding: 12px 24px;
            border: none; cursor: pointer; border-radius: 4px; font-size: 16px;
        }
    </style>
</head>
<body>
<div class="no-print">
    <button class="btn-print" onclick="window.print()">Print Labels (No Gaps)</button>
    <p>Sized for 9.2cm wide to fit 12.7mm margins. Edit text directly below.</p>
</div>
<div class="label-grid" contenteditable="true">
    {{LABELS_HERE}}
</div>
</body>
</html>
